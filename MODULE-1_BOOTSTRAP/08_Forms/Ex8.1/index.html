<!DOCTYPE html>
<html>
<head>
    <title>Exercise 8.1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <input type="text"

           placeholder="Enter Name">

    <br>

    </div>

</div>
