<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
<style>

.eventCard{
    border:2px solid black;
    padding:20px;
    margin:20px;
}

input:focus{
    outline:2px solid red;
}

.hidden{
    visibility:hidden;
}

.none{
    display:none;
}

</style>
</head>

<body>

<div class="eventCard">
    Event Details
</div>

<input type="text">

<p class="hidden">Hidden Text</p>

<p class="none">Not Displayed</p>

</body>
</html>
