<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
<style>

table{
    border-collapse:collapse;
}

th,td{
    border:1px solid black;
    padding:10px;
    text-align:center;
}

th{
    background-color:lightblue;
}

tr:nth-child(even){
    background-color:lightgray;
}

</style>
</head>

<body>

<table>
<tr>
    <th>Name</th>
    <th>Event</th>
</tr>

<tr>
    <td>John</td>
    <td>Music</td>
</tr>

<tr>
    <td>Sam</td>
    <td>Sports</td>
</tr>
</table>

</body>
</html>
