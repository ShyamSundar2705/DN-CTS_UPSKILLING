<!DOCTYPE html>
<html>
<body>

Phone:
<input type="text" onblur="alert('Phone Checked')">
<br><br>

<select onchange="showFee(this.value)">
    <option value="">Select</option>
    <option value="100">Music</option>
    <option value="200">Sports</option>
</select>

<p id="fee"></p>

<img src="img.jpg" width="100"
ondblclick="this.width=200">

<br><br>

<textarea onkeyup="countChar(this)"></textarea>

<p id="count">0</p>

<button onclick="alert('Submitted Successfully')">
Submit
</button>

<script>
function showFee(x){
    document.getElementById("fee").innerHTML=
    "Fee: ₹"+x;
}

function countChar(x){
    document.getElementById("count").innerHTML=
    x.value.length;
}
</script>

</body>
</html>
