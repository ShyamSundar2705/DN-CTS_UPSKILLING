<!DOCTYPE html>
<html>
<head>
<style>
form{
    width:300px;
    border:1px solid black;
    padding:20px;
}
</style>
</head>

<body>

<form onsubmit="msg.value='Registration Successful'">

Name:
<input type="text" placeholder="Enter Name" required autofocus>
<br><br>

Email:
<input type="email" placeholder="Enter Email" required>
<br><br>

Date:
<input type="date" required>
<br><br>

Event Type:
<select>
    <option>Music</option>
    <option>Sports</option>
    <option>Workshop</option>
</select>
<br><br>

Message:
<textarea></textarea>
<br><br>

<input type="submit">

<br><br>

<output name="msg"></output>

</form>

</body>
</html>
